# 数据路径
data_path: "./data/synthetic"
dataset: ""

# 模型参数
emb_dim: 64
n_layers: 3

# 训练参数
batch_size: 256
epochs: 200
lr: 0.001
decay: 1e-4
top_k: 20

# 早停
early_stop_patience: 5
eval_interval: 20

# DP参数
enable_dp: false
epsilon: [1, 5, 10, 20, 50]
delta: 1e-05
sensitivity: 1.0
budget_strategy: "adaptive"

# 随机种子
seed: 2024
