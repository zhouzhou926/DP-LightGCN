# 数据路径
data_path: "./data"
dataset: "yelp2018"  # yelp2018 / gowalla / amazon-book

# 模型参数
emb_dim: 64
n_layers: 3
dropout: 0.0
node_dropout: 0.0

# 训练参数
batch_size: 2048
epochs: 1000
lr: 0.001
decay: 1e-4
top_k: 20

# 早停
early_stop_patience: 5
eval_interval: 20

# DP参数
enable_dp: true
epsilon: [1, 5, 10, 20, 50]  # 多个epsilon跑对比
delta: 1e-5
sensitivity: 1.0
budget_strategy: "adaptive"  # uniform / decreasing / adaptive
dp_mechanism: "gaussian"     # gaussian / laplace

# 隐私会计
use_rdp: true

# 随机种子
seed: 2024
